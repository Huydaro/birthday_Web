<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Kannyka - Royal Edition</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Moul (Khmer Classic) & Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Moul&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-light: #fbf5b7;
            --gold-main: #bf953f;
            --gold-dark: #aa771c;
            --royal-red: #580000;
            --bg-dark: #1a0505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Moul', serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(191, 149, 63, 0.1) 0%, transparent 60%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23bf953f' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--gold-main);
        }

        /* Floating Petals */
        .petal {
            position: absolute;
            top: -10%;
            color: rgba(255, 192, 203, 0.6);
            font-size: 1.5rem;
            animation: fall linear infinite;
            z-index: 1;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg) translateX(50px); opacity: 0; }
        }

        /* Main Card - Royal Style */
        .royal-card {
            background: rgba(20, 5, 5, 0.85);
            backdrop-filter: blur(15px);
            width: 90%;
            max-width: 500px;
            padding: 60px 30px;
            text-align: center;
            position: relative;
            z-index: 10;
            border: 2px solid var(--gold-main);
            box-shadow: 
                0 0 20px rgba(191, 149, 63, 0.3),
                inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* Ornate Corners */
        .corner {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 3px solid var(--gold-main);
            transition: all 0.5s;
        }
        .tl { top: -5px; left: -5px; border-right: none; border-bottom: none; border-top-left-radius: 20px; }
        .tr { top: -5px; right: -5px; border-left: none; border-bottom: none; border-top-right-radius: 20px; }
        .bl { bottom: -5px; left: -5px; border-right: none; border-top: none; border-bottom-left-radius: 20px; }
        .br { bottom: -5px; right: -5px; border-left: none; border-top: none; border-bottom-right-radius: 20px; }

        /* Gold Shimmer Text */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--gold-light) 0%, var(--gold-main) 50%, var(--gold-light) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .khmer-name {
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(191, 149, 63, 0.5);
            letter-spacing: 2px;
        }

        /* Countdown - Minimalist Gold */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            border-top: 1px solid rgba(191, 149, 63, 0.3);
            border-bottom: 1px solid rgba(191, 149, 63, 0.3);
            padding: 20px 0;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
        }

        .t-num {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--gold-main);
        }

        .t-label {
            font-size: 0.8rem;
            color: #aaa;
            font-family: 'Kantumruy Pro', sans-serif;
        }

        /* Luxury Gift Box */
        .gift-container {
            width: 140px;
            height: 140px;
            margin: 0 auto;
            position: relative;
            cursor: pointer;
            perspective: 1000px;
        }

        .gift-box {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .box-body {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(135deg, var(--royal-red), #300000);
            border: 2px solid var(--gold-main);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .ribbon {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 100%;
            background: var(--gold-main);
            box-shadow: 0 0 10px rgba(191, 149, 63, 0.5);
        }

        .lid {
            position: absolute;
            top: 20px;
            left: -10px;
            width: 160px;
            height: 40px;
            background: linear-gradient(to right, var(--gold-dark), var(--gold-main), var(--gold-dark));
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 2;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .bow {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            color: var(--gold-light);
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .gift-container.opened .lid {
            transform: translateY(-120px) rotate(-15deg);
            opacity: 0;
        }

        /* Secret Area */
        .secret-area {
            margin-top: 40px;
            display: none;
            animation: fadeIn 1s ease;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--gold-main);
            padding: 10px;
            font-family: 'Moul', serif;
            font-size: 1.2rem;
            text-align: center;
            width: 80%;
            color: white;
            outline: none;
            margin-bottom: 20px;
        }

        input::placeholder { color: rgba(255,255,255,0.3); }

        button {
            background: linear-gradient(to right, var(--gold-dark), var(--gold-main));
            border: none;
            padding: 12px 40px;
            font-family: 'Moul', serif;
            font-size: 1.1rem;
            color: var(--royal-red);
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(191, 149, 63, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(191, 149, 63, 0.5);
        }

        .final-msg {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #fff;
        }

        .highlight {
            color: var(--gold-main);
            font-size: 1.5rem;
        }

        /* Music Button */
        .music-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--royal-red);
            border: 2px solid var(--gold-main);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--gold-main);
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
        }

        .music-btn:hover {
            background: var(--gold-main);
            color: var(--royal-red);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .khmer-name { font-size: 1.3rem; }
            .royal-card { padding: 40px 15px; }
        }
    </style>
</head>
<body>

    <!-- Falling Petals Container -->
    <div id="petals-container"></div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/Games/Music/HappyBirthday.mp3" type="audio/mpeg">
    </audio>

    <div class="royal-card">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <h1>Happy Birthday</h1>
        <div class="khmer-name">ស៊ុយ សេរីកាន់ន្និកា</div>

        <div class="countdown" id="countdown">
            <div class="time-unit">
                <span class="t-num" id="d">00</span>
                <span class="t-label">ថ្ងៃ</span>
            </div>
            <div class="time-unit">
                <span class="t-num" id="h">00</span>
                <span class="t-label">ម៉ោង</span>
            </div>
            <div class="time-unit">
                <span class="t-num" id="m">00</span>
                <span class="t-label">នាទី</span>
            </div>
            <div class="time-unit">
                <span class="t-num" id="s">00</span>
                <span class="t-label">វិនាទី</span>
            </div>
        </div>

        <div id="bdayMsg" style="display:none; color: var(--gold-main); margin-bottom: 20px; font-size: 1.2rem;">
            🎉 ថ្ងៃមង្គលបានមកដល់ហើយ! 🎉
        </div>

        <!-- Gift -->
        <div class="gift-container" id="giftBox" onclick="openGift()">
            <div class="gift-box">
                <div class="lid">
                    <i class="fas fa-crown bow"></i>
                </div>
                <div class="box-body">
                    <div class="ribbon"></div>
                </div>
            </div>
        </div>

        <!-- Secret -->
        <div class="secret-area" id="secretArea">
            <div id="passSection">
                <p style="color: #aaa; margin-bottom: 15px; font-size: 0.9rem;">🔑 បញ្ចូលពាក្យសម្ងាត់ដើម្បីទទួលពរ</p>
                <input type="password" id="passInput" placeholder="...">
                <br>
                <button onclick="checkPass()">បើកអំណោយ</button>
            </div>

            <div id="finalMsg" style="display:none;">
                <p class="final-msg">
                    សូមឱ្យអូន <span class="highlight">ស៊ុយ សេរីកាន់ន្និកា</span><br>
                    ស្រស់ស្អាតដូចព្រះនាង<br>
                    និងមានសុភមង្គលជារៀងរហូត!<br>
                    <br>
                    <i class="fas fa-heart" style="color: var(--gold-main); font-size: 2rem;"></i>
                </p>
            </div>
        </div>
    </div>

    <div class="music-btn" onclick="toggleMusic()">
        <i class="fas fa-music" id="musicIcon"></i>
    </div>

    <script>
        // Config
        const targetDate = new Date("Dec 17, 2025 00:00:00").getTime();
        const password = "Kannyka";

        // Create Petals
        function createPetals() {
            const container = document.getElementById('petals-container');
            const symbols = ['🌸', '🏵️', '✨'];
            
            setInterval(() => {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
                petal.style.fontSize = (Math.random() * 1 + 1) + 'rem';
                container.appendChild(petal);
                
                setTimeout(() => { petal.remove(); }, 10000);
            }, 800);
        }
        createPetals();

        // Countdown
        setInterval(() => {
            const now = new Date().getTime();
            const dist = targetDate - now;
            
            if(dist < 0) {
                document.getElementById('countdown').style.display = 'none';
                document.getElementById('bdayMsg').style.display = 'block';
                return;
            }

            document.getElementById('d').innerText = Math.floor(dist / (1000 * 60 * 60 * 24));
            document.getElementById('h').innerText = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('m').innerText = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('s').innerText = Math.floor((dist % (1000 * 60)) / 1000);
        }, 1000);

        // Gift Logic
        function openGift() {
            const box = document.getElementById('giftBox');
            const secret = document.getElementById('secretArea');
            if(!box.classList.contains('opened')) {
                box.classList.add('opened');
                setTimeout(() => {
                    secret.style.display = 'block';
                }, 600);
            }
        }

        function checkPass() {
            const val = document.getElementById('passInput').value;
            if(val === password) {
                document.getElementById('passSection').style.display = 'none';
                document.getElementById('finalMsg').style.display = 'block';
                playMusic();
            } else {
                alert("ពាក្យសម្ងាត់មិនត្រឹមត្រូវ 😜");
            }
        }

        // Music
        const audio = document.getElementById("bgMusic");
        let isPlaying = false;
        function toggleMusic() {
            if(isPlaying) { audio.pause(); document.getElementById('musicIcon').className = "fas fa-music"; }
            else { audio.play(); document.getElementById('musicIcon').className = "fas fa-pause"; }
            isPlaying = !isPlaying;
        }
        function playMusic() { if(!isPlaying) toggleMusic(); }
    </script>
</body>
</html>
