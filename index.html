<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Kannyka - Royal Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Moul&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-light: #fbf5b7;
            --gold-main: #bf953f;
            --gold-dark: #aa771c;
            --royal-red: #580000;
            --bg-dark: #1a0505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Moul', serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(191, 149, 63, 0.1) 0%, transparent 60%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23bf953f' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--gold-main);
        }

        .petal {
            position: absolute;
            top: -10%;
            color: rgba(255, 192, 203, 0.6);
            font-size: 1.5rem;
            animation: fall linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg) translateX(50px); opacity: 0; }
        }

        .royal-card {
            background: rgba(20, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            width: 90%;
            max-width: 500px;
            padding: 50px 25px;
            text-align: center;
            position: relative;
            z-index: 10;
            border: 2px solid var(--gold-main);
            box-shadow: 0 0 30px rgba(191, 149, 63, 0.2);
            border-radius: 5px;
        }

        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid var(--gold-main);
        }
        .tl { top: -3px; left: -3px; border-right: none; border-bottom: none; }
        .tr { top: -3px; right: -3px; border-left: none; border-bottom: none; }
        .bl { bottom: -3px; left: -3px; border-right: none; border-top: none; }
        .br { bottom: -3px; right: -3px; border-left: none; border-top: none; }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--gold-light), var(--gold-main), var(--gold-light));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .khmer-name {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 35px;
            text-shadow: 0 0 10px rgba(191, 149, 63, 0.5);
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            border: 1px solid rgba(191, 149, 63, 0.3);
        }

        .time-unit { text-align: center; }
        .t-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold-main); display: block; }
        .t-label { font-size: 0.7rem; color: #aaa; }

        .gift-container {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            position: relative;
            cursor: pointer;
            perspective: 1000px;
        }

        .box-body {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 90px;
            background: linear-gradient(135deg, var(--royal-red), #300000);
            border: 2px solid var(--gold-main);
            border-radius: 0 0 5px 5px;
        }

        .ribbon {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 100%;
            background: var(--gold-main);
        }

        .lid {
            position: absolute;
            top: 15px;
            left: -10px;
            width: 140px;
            height: 35px;
            background: var(--gold-main);
            border-radius: 5px;
            z-index: 2;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .bow {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            color: var(--gold-light);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.1); } }

        .gift-container.opened .lid {
            transform: translateY(-100px) rotate(-20deg);
            opacity: 0;
        }

        .secret-area {
            margin-top: 30px;
            display: none;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--gold-main);
            padding: 10px;
            font-family: 'Moul', serif;
            font-size: 1.1rem;
            text-align: center;
            width: 80%;
            color: white;
            outline: none;
            margin-bottom: 15px;
        }

        button.unlock-btn {
            background: linear-gradient(to right, var(--gold-dark), var(--gold-main));
            border: none;
            padding: 10px 30px;
            font-family: 'Moul', serif;
            font-size: 1rem;
            color: var(--royal-red);
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        button.unlock-btn:hover { transform: scale(1.05); }

        .final-msg { font-size: 1.2rem; line-height: 1.6; color: #fff; }
        .highlight { color: var(--gold-main); font-size: 1.4rem; }

        /* IMPROVED MUSIC BUTTON */
        .music-control {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .music-btn {
            width: 60px;
            height: 60px;
            background: var(--royal-red);
            border: 2px solid var(--gold-main);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--gold-main);
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(191, 149, 63, 0.4);
            transition: 0.3s;
            animation: bounceBtn 2s infinite;
        }

        @keyframes bounceBtn { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .music-btn:hover { background: var(--gold-main); color: var(--royal-red); animation: none; }

        .music-label {
            color: white;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 10px;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div id="petals-container"></div>

    <!-- NEW RELIABLE AUDIO LINK -->
    <audio id="bgMusic" loop>
        <source src="https://www.myinstants.com/media/sounds/happy-birthday-song.mp3" type="audio/mpeg">
    </audio>

    <div class="royal-card">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <h1>Happy Birthday</h1>
        <div class="khmer-name">ស៊ុយ សេរីកាន់ន្និកា</div>

        <div class="countdown" id="countdown">
            <div class="time-unit"><span class="t-num" id="d">00</span><span class="t-label">ថ្ងៃ</span></div>
            <div class="time-unit"><span class="t-num" id="h">00</span><span class="t-label">ម៉ោង</span></div>
            <div class="time-unit"><span class="t-num" id="m">00</span><span class="t-label">នាទី</span></div>
            <div class="time-unit"><span class="t-num" id="s">00</span><span class="t-label">វិនាទី</span></div>
        </div>

        <div id="bdayMsg" style="display:none; color: var(--gold-main); margin-bottom: 20px;">
            🎉 ថ្ងៃមង្គលបានមកដល់ហើយ! 🎉
        </div>

        <div class="gift-container" id="giftBox" onclick="openGift()">
            <div class="lid"><i class="fas fa-crown bow"></i></div>
            <div class="box-body"><div class="ribbon"></div></div>
        </div>

        <div class="secret-area" id="secretArea">
            <div id="passSection">
                <p style="color: #aaa; margin-bottom: 10px; font-size: 0.9rem;">🔑 បញ្ចូលពាក្យសម្ងាត់</p>
                <input type="password" id="passInput" placeholder="...">
                <br>
                <button class="unlock-btn" onclick="checkPass()">បើកអំណោយ</button>
            </div>
            <div id="finalMsg" style="display:none;">
                <p class="final-msg">
                    សូមឱ្យអូន <span class="highlight">ស៊ុយ សេរីកាន់ន្និកា</span><br>
                    ស្រស់ស្អាតដូចព្រះនាង<br>
                    និងមានសុភមង្គលជារៀងរហូត!<br>
                    <br>
                    <i class="fas fa-heart" style="color: var(--gold-main); font-size: 2rem;"></i>
                </p>
            </div>
        </div>
    </div>

    <!-- Visible Music Control -->
    <div class="music-control">
        <div class="music-btn" onclick="toggleMusic()">
            <i class="fas fa-music" id="musicIcon"></i>
        </div>
        <span class="music-label" id="musicText">ចាក់ភ្លេង</span>
    </div>

    <script>
        const targetDate = new Date("Dec 17, 2025 00:00:00").getTime();
        const password = "Kannyka";

        // Petals
        function createPetals() {
            const container = document.getElementById('petals-container');
            const symbols = ['🌸', '🏵️', '✨'];
            setInterval(() => {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
                container.appendChild(petal);
                setTimeout(() => { petal.remove(); }, 10000);
            }, 800);
        }
        createPetals();

        // Countdown
        setInterval(() => {
            const now = new Date().getTime();
            const dist = targetDate - now;
            if(dist < 0) {
                document.getElementById('countdown').style.display = 'none';
                document.getElementById('bdayMsg').style.display = 'block';
                return;
            }
            document.getElementById('d').innerText = Math.floor(dist / (1000 * 60 * 60 * 24));
            document.getElementById('h').innerText = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('m').innerText = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('s').innerText = Math.floor((dist % (1000 * 60)) / 1000);
        }, 1000);

        // Gift
        function openGift() {
            const box = document.getElementById('giftBox');
            const secret = document.getElementById('secretArea');
            if(!box.classList.contains('opened')) {
                box.classList.add('opened');
                setTimeout(() => { secret.style.display = 'block'; }, 600);
            }
        }

        function checkPass() {
            const val = document.getElementById('passInput').value;
            if(val === password) {
                document.getElementById('passSection').style.display = 'none';
                document.getElementById('finalMsg').style.display = 'block';
                if(!isPlaying) toggleMusic();
            } else {
                alert("ពាក្យសម្ងាត់មិនត្រឹមត្រូវ 😜");
            }
        }

        // Music Logic
        const audio = document.getElementById("bgMusic");
        let isPlaying = false;
        
        function toggleMusic() {
            const icon = document.getElementById('musicIcon');
            const label = document.getElementById('musicText');
            
            if(isPlaying) { 
                audio.pause(); 
                icon.className = "fas fa-music"; 
                label.innerText = "ចាក់ភ្លេង";
            } else { 
                // Try to play
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => {
                        // Playback started successfully
                        icon.className = "fas fa-pause"; 
                        label.innerText = "បិទភ្លេង";
                        isPlaying = true;
                    })
                    .catch(error => {
                        console.log("Playback failed:", error);
                        alert("សូមចុចលើអេក្រង់ម្តងទៀត ដើម្បីចាក់ភ្លេង!");
                    });
                }
            }
            if(isPlaying && audio.paused) isPlaying = false; // Sync state
        }
    </script>
</body>
</html>
