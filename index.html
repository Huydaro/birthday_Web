<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>រីករាយថ្ងៃកំណើត ស៊ុយ សេរីកាន់ន្និកា</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Koulen&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Koulen', 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== BACKGROUND ANIMATION ===== */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-orbs {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .bg-orbs:nth-child(1) {
            width: 400px;
            height: 400px;
            background: #ff6b6b;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-orbs:nth-child(2) {
            width: 350px;
            height: 350px;
            background: #ffd700;
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        .bg-orbs:nth-child(3) {
            width: 300px;
            height: 300px;
            background: #a18cd1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 50px) scale(0.9); }
            75% { transform: translate(30px, -20px) scale(1.05); }
        }

        /* ===== STARS ===== */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(2px 2px at 10% 20%, #fff, transparent),
                radial-gradient(2px 2px at 30% 60%, #ffd700, transparent),
                radial-gradient(2px 2px at 50% 10%, #a18cd1, transparent),
                radial-gradient(2px 2px at 70% 80%, #fbc2eb, transparent),
                radial-gradient(2px 2px at 90% 40%, #ff9a9e, transparent),
                radial-gradient(3px 3px at 15% 85%, #ffd700, transparent),
                radial-gradient(3px 3px at 45% 45%, #ff6b6b, transparent),
                radial-gradient(3px 3px at 75% 25%, #a8edea, transparent),
                radial-gradient(4px 4px at 85% 55%, #ffecd2, transparent),
                radial-gradient(4px 4px at 5% 50%, #a18cd1, transparent),
                radial-gradient(4px 4px at 95% 90%, #fbc2eb, transparent);
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.6;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }

        /* ===== SHOOTING STARS ===== */
        .shooting-star {
            position: absolute;
            width: 120px;
            height: 2px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.8));
            border-radius: 50%;
            animation: shoot linear infinite;
            z-index: 1;
        }

        .shooting-star::after {
            content: '';
            position: absolute;
            top: -3px;
            right: 0;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
        }

        .shooting-star:nth-child(1) { top: 10%; left: 80%; animation-duration: 6s; animation-delay: 0s; }
        .shooting-star:nth-child(2) { top: 25%; left: 60%; animation-duration: 8s; animation-delay: 3s; }
        .shooting-star:nth-child(3) { top: 5%; left: 90%; animation-duration: 7s; animation-delay: 5s; }
        .shooting-star:nth-child(4) { top: 35%; left: 70%; animation-duration: 9s; animation-delay: 1s; }

        @keyframes shoot {
            0% {
                transform: translate(0, 0) rotate(-35deg) scaleX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translate(0, 0) rotate(-35deg) scaleX(1);
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translate(-500px, 500px) rotate(-35deg) scaleX(0.5);
                opacity: 0;
            }
        }

        /* ===== FLOATING ELEMENTS ===== */
        .float-element {
            position: fixed;
            z-index: 1;
            pointer-events: none;
            font-size: 2.5rem;
            animation: floatAround 25s linear infinite;
            opacity: 0.5;
        }

        .float-element:nth-child(1) { top: 20%; left: 5%; animation-duration: 20s; }
        .float-element:nth-child(2) { bottom: 15%; right: 3%; animation-duration: 28s; animation-delay: -5s; }
        .float-element:nth-child(3) { top: 60%; left: 2%; animation-duration: 22s; animation-delay: -10s; }

        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0.3; }
            25% { transform: translate(50px, -30px) rotate(90deg) scale(1.2); opacity: 0.6; }
            50% { transform: translate(-20px, 40px) rotate(180deg) scale(0.8); opacity: 0.3; }
            75% { transform: translate(30px, -20px) rotate(270deg) scale(1.1); opacity: 0.6; }
            100% { transform: translate(0, 0) rotate(360deg) scale(1); opacity: 0.3; }
        }

        /* ===== SUN ===== */
        .sun {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #fff7a0, #ffd700, #ff6b00);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255,215,0,0.3), 0 0 120px rgba(255,215,0,0.1);
            z-index: 1;
            animation: sunPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        .sun::after {
            content: '☀️';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
        }

        @keyframes sunPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(255,215,0,0.3); }
            50% { transform: scale(1.1); box-shadow: 0 0 80px rgba(255,215,0,0.5), 0 0 160px rgba(255,215,0,0.2); }
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 820px;
            overflow: hidden;
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: containerFloat 6s ease-in-out infinite;
        }

        @keyframes containerFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* ===== HEADER ===== */
        header {
            position: relative;
            padding: 35px 25px 30px;
            text-align: center;
            background: linear-gradient(135deg, rgba(255,107,107,0.15), rgba(255,215,0,0.10), rgba(161,140,209,0.15));
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        header h1 {
            font-size: 2.6rem;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b, #a18cd1, #ffd700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 4s ease-in-out infinite;
            letter-spacing: 2px;
        }

        header h1:last-of-type {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #ff9a9e);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 5s ease-in-out infinite;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 1.05rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 12px;
            margin-top: 8px;
        }

        .subtitle i {
            margin: 0 6px;
            animation: iconDance 2s ease-in-out infinite;
        }

        .subtitle i:nth-child(1) { color: #ff6b6b; animation-delay: 0s; }
        .subtitle i:nth-child(2) { color: #ffd700; animation-delay: 0.4s; }
        .subtitle i:nth-child(3) { color: #a18cd1; animation-delay: 0.8s; }
        .subtitle i:nth-child(4) { color: #fbc2eb; animation-delay: 1.2s; }
        .subtitle i:nth-child(5) { color: #ffd700; animation-delay: 1.6s; }

        @keyframes iconDance {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(15deg); }
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            padding: 30px;
        }

        .result-section {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .result-section h2 {
            color: #ffd700;
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 20px;
            letter-spacing: 3px;
            text-shadow: 0 0 40px rgba(255,215,0,0.15);
        }

        /* ===== BIRTHDAY MESSAGE ===== */
        .birthday-message {
            text-align: center;
            padding: 25px 20px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(255,107,107,0.08), rgba(255,215,0,0.06));
            border: 1px solid rgba(255,215,0,0.08);
        }

        .cake {
            font-size: 5rem;
            display: inline-block;
            animation: cakeBounce 2.5s ease-in-out infinite;
            filter: drop-shadow(0 10px 30px rgba(255,215,0,0.2));
        }

        @keyframes cakeBounce {
            0%, 100% { transform: translateY(0) rotate(-3deg) scale(1); }
            30% { transform: translateY(-15px) rotate(2deg) scale(1.05); }
            60% { transform: translateY(-25px) rotate(-2deg) scale(1.08); }
            80% { transform: translateY(-10px) rotate(3deg) scale(1.03); }
        }

        .birthday-text {
            font-size: 1.6rem;
            color: rgba(255,255,255,0.9);
            line-height: 1.6;
            margin: 10px 0;
        }

        .birthday-text .highlight {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        /* ===== COUNTDOWN ===== */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(255,255,255,0.04);
            padding: 18px 24px;
            border-radius: 16px;
            min-width: 85px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.04);
            transition: all 0.3s ease;
        }

        .countdown-item:hover {
            transform: translateY(-5px);
            border-color: rgba(255,215,0,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .countdown-number {
            font-size: 2.6rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            line-height: 1.2;
        }

        .countdown-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* ===== GIFT BOX ===== */
        .gift-section {
            margin: 15px auto 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .gift-box-wrapper {
            perspective: 800px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .gift-box-wrapper:hover {
            transform: scale(1.05);
        }

        .gift-box {
            width: 220px;
            height: 175px;
            position: relative;
            margin: 0 auto;
        }

        .gift-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #ff6b6b, #ee5a24);
            border-radius: 16px 16px 24px 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: top center;
            position: relative;
            overflow: hidden;
        }

        .gift-body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.15), transparent 60%);
            animation: shineMove 4s ease-in-out infinite;
        }

        @keyframes shineMove {
            0%, 100% { transform: translateX(-30%) rotate(0deg); }
            50% { transform: translateX(30%) rotate(5deg); }
        }

        .gift-lid {
            position: absolute;
            top: -12px;
            left: -8px;
            right: -8px;
            height: 45px;
            background: linear-gradient(145deg, #ffd700, #f59e0b);
            border-radius: 16px 16px 6px 6px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transform-origin: center bottom;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gift-lid::before {
            content: '🎀';
            font-size: 2.6rem;
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }

        .gift-open .gift-lid {
            transform: translateY(-85px) rotateX(60deg) scale(0.9);
            opacity: 0.9;
        }

        .gift-ribbon {
            position: absolute;
            top: 0;
            left: 50%;
            width: 14px;
            height: 100%;
            background: linear-gradient(180deg, #ffd700, #f59e0b);
            transform: translateX(-50%);
            z-index: 2;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }

        .gift-ribbon-horizontal {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 14px;
            background: linear-gradient(90deg, #ffd700, #f59e0b);
            transform: translateY(-50%);
            z-index: 2;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }

        .gift-sparkles {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 3;
        }

        .sparkle {
            position: absolute;
            font-size: 1.2rem;
            animation: sparkleFloat 3s ease-in-out infinite;
        }

        .sparkle:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; color: #ffd700; }
        .sparkle:nth-child(2) { top: 15%; right: 12%; animation-delay: 0.6s; color: #ff6b6b; }
        .sparkle:nth-child(3) { bottom: 20%; left: 15%; animation-delay: 1.2s; color: #a18cd1; }
        .sparkle:nth-child(4) { bottom: 15%; right: 8%; animation-delay: 1.8s; color: #fbc2eb; }
        .sparkle:nth-child(5) { top: 45%; left: 50%; transform: translate(-50%, -50%); animation-delay: 2.4s; font-size: 2rem; color: #ffd700; }

        @keyframes sparkleFloat {
            0%, 100% { transform: translateY(0) scale(0.8) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-15px) scale(1.3) rotate(180deg); opacity: 1; }
        }

        .gift-body .gift-label {
            position: relative;
            z-index: 4;
            font-size: 1rem;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            background: rgba(0,0,0,0.15);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ===== GIFT RESULT ===== */
        .gift-result {
            margin-top: 18px;
            padding: 20px 28px;
            background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(255,107,107,0.05));
            border-radius: 18px;
            border: 1px solid rgba(255,215,0,0.12);
            animation: resultSlide 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
            width: 100%;
            max-width: 480px;
        }

        @keyframes resultSlide {
            0% { transform: scale(0.8) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        #giftResultIcon {
            font-size: 3rem;
            display: block;
            margin-bottom: 5px;
            animation: iconPop 0.7s ease-out, iconFloat 2.5s ease-in-out infinite 0.7s;
        }

        @keyframes iconPop {
            0% { transform: scale(0) rotate(-180deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }

        #giftResultAmount {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }

        #giftSmallMsg {
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            margin-top: 4px;
        }

        .gift-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #fff;
            padding: 3px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 8px;
        }

        /* ===== GIFT CONTROLS ===== */
        .gift-controls {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 380px;
        }

        .gift-controls input {
            padding: 10px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #fff;
            width: 100%;
            text-align: center;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .gift-controls input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.05);
            background: rgba(255,255,255,0.06);
        }

        .gift-controls input::placeholder {
            color: rgba(255,255,255,0.25);
        }

        .gift-controls button {
            padding: 10px 35px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            color: #1a1a2e;
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 25px rgba(255,215,0,0.15);
            width: 100%;
        }

        .gift-controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 35px rgba(255,215,0,0.25);
        }

        #congratsText {
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: bold;
            animation: congratsPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes congratsPop {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 18px;
            background: rgba(0,0,0,0.15);
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.03);
            letter-spacing: 1px;
        }

        /* ===== MUSIC BUTTON ===== */
        #musicBtn {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 100;
            padding: 10px 16px;
            border-radius: 50px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #musicBtn:hover {
            background: rgba(255,215,0,0.1);
            border-color: rgba(255,215,0,0.2);
            color: #fff;
        }

        /* ===== CONFETTI ===== */
        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            border-radius: 2px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            header h1 { font-size: 2rem; }
            header h1:last-of-type { font-size: 1.6rem; }
            .main-content { padding: 20px; }
            .birthday-text { font-size: 1.2rem; }
            .cake { font-size: 3.8rem; }
            .countdown-item { min-width: 68px; padding: 14px 16px; }
            .countdown-number { font-size: 2rem; }
            .gift-box { width: 180px; height: 148px; }
            .gift-body { font-size: 0.9rem; }
            .gift-lid { height: 38px; top: -10px; }
            .gift-lid::before { font-size: 2.2rem; top: -14px; }
            #musicBtn { right: 12px; bottom: 12px; padding: 8px 14px; font-size: 0.75rem; }
            .gift-result { padding: 15px 18px; }
            #giftResultAmount { font-size: 1.5rem; }
            #giftResultIcon { font-size: 2.2rem; }
            .sun { width: 50px; height: 50px; top: 12px; right: 12px; }
            .sun::after { font-size: 1.8rem; }
            .float-element { font-size: 1.8rem; }
        }

        @media (max-width: 480px) {
            header { padding: 25px 15px 20px; }
            header h1 { font-size: 1.5rem; }
            header h1:last-of-type { font-size: 1.3rem; }
            .subtitle { font-size: 0.8rem; }
            .birthday-text { font-size: 1rem; }
            .countdown-item { min-width: 55px; padding: 10px 12px; }
            .countdown-number { font-size: 1.5rem; }
            .countdown-label { font-size: 0.7rem; }
            .gift-box { width: 150px; height: 125px; }
            .gift-body { font-size: 0.8rem; border-radius: 14px; }
            .gift-lid { height: 34px; top: -8px; border-radius: 14px 14px 4px 4px; }
            .gift-lid::before { font-size: 1.8rem; top: -12px; }
            .gift-ribbon { width: 10px; }
            .gift-ribbon-horizontal { height: 10px; }
            #giftResultAmount { font-size: 1.2rem; }
            #giftResultIcon { font-size: 1.8rem; }
            .gift-controls input { font-size: 0.9rem; padding: 8px 14px; }
            .gift-controls button { font-size: 0.95rem; padding: 8px 25px; }
            .sun { width: 40px; height: 40px; top: 10px; right: 10px; }
            .sun::after { font-size: 1.4rem; }
            .float-element { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <!-- ===== BACKGROUND ===== -->
    <div class="bg-animation">
        <div class="bg-orbs"></div>
        <div class="bg-orbs"></div>
        <div class="bg-orbs"></div>
        <div class="stars"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
    </div>

    <!-- ===== FLOATING ELEMENTS ===== -->
    <div class="float-element">🚀</div>
    <div class="float-element">🛸</div>
    <div class="float-element">🌟</div>

    <!-- ===== SUN ===== -->
    <div class="sun"></div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="container">
        <header>
            <h1>🎉 រីករាយថ្ងៃកំណើត 🎉</h1>
            <h1>ស៊ុយ សេរីកាន់ន្និកា</h1>
            <div class="subtitle">
                <i class="fas fa-star"></i>
                ការរាប់ថយក្រោយសម្រាប់ថ្ងៃទី 17 ខែធ្នូ ឆ្នាំ 2025
                <i class="fas fa-heart"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-rocket"></i>
                <i class="fas fa-star"></i>
            </div>
        </header>

        <div class="main-content">
            <section class="result-section">
                <h2>⏳ ការរាប់ថយក្រោយ</h2>
                <div class="birthday-message" id="birthdayMessage">
                    <div class="cake">🎂</div>

                    <div class="gift-section">
                        <div class="gift-box-wrapper" id="giftBoxWrapper" title="ចុចដើម្បីបើកអំណោយ">
                            <div class="gift-box" id="giftBox">
                                <div class="gift-lid"></div>
                                <div class="gift-body">
                                    <div class="gift-ribbon"></div>
                                    <div class="gift-ribbon-horizontal"></div>
                                    <div class="gift-sparkles">
                                        <span class="sparkle">✨</span>
                                        <span class="sparkle">⭐</span>
                                        <span class="sparkle">🌟</span>
                                        <span class="sparkle">💫</span>
                                        <span class="sparkle">🎁</span>
                                    </div>
                                    <span class="gift-label">🎁 អំណោយរបស់អ្នក</span>
                                </div>
                            </div>
                        </div>

                        <div id="giftResult" class="gift-result" style="display:none;">
                            <span id="giftResultIcon">💝</span>
                            <span id="giftResultAmount"></span>
                            <div id="giftSmallMsg"></div>
                            <span class="gift-badge">🎯 ពិសេសសម្រាប់តែអូន</span>
                        </div>

                        <div class="gift-controls" id="giftControls" style="display:none;">
                            <input id="giftPassword" type="password" placeholder="🔑 បញ្ចូលពាក្យសម្ងាត់" maxlength="30">
                            <button id="giftUnlockBtn"><i class="fas fa-unlock-alt"></i> បើកអំណោយ</button>
                            <div id="congratsText" style="display:none;">
                                <i class="fas fa-gift"></i> សូមអបអរសាទរ! 🎉
                            </div>
                        </div>
                    </div>

                    <div class="birthday-text" id="birthdayText">កំពុងគណនាថ្ងៃកំណើត...</div>

                    <div class="countdown" id="countdown">
                        <div class="countdown-item">
                            <span class="countdown-number" id="days">0</span>
                            <div class="countdown-label">ថ្ងៃ</div>
                        </div>
                        <div class="countdown-item">
                            <span class="countdown-number" id="hours">0</span>
                            <div class="countdown-label">ម៉ោង</div>
                        </div>
                        <div class="countdown-item">
                            <span class="countdown-number" id="minutes">0</span>
                            <div class="countdown-label">នាទី</div>
                        </div>
                        <div class="countdown-item">
                            <span class="countdown-number" id="seconds">0</span>
                            <div class="countdown-label">វិនាទី</div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <footer>
            <p>© 2026 គេហទំព័រថ្ងៃកំណើតសម្រាប់តែពន្ធតែប៉ុណ្ណោះ Kannyka 💛</p>
        </footer>
    </div>

    <button id="musicBtn"><i class="fas fa-music"></i> <span id="musicLabel">ចាក់ភ្លេង</span></button>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ===== CONFIG =====
            const TARGET_MONTH = 11;
            const TARGET_DAY = 17;
            const TARGET_YEAR = 2025;
            const BIRTH_YEAR = 2004;
            const PASSWORD = 'អូនជាពន្លឺនៃបង';

            // ===== DOM =====
            const birthdayText = document.getElementById('birthdayText');
            const countdown = document.getElementById('countdown');
            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const giftBox = document.getElementById('giftBox');
            const giftBoxWrapper = document.getElementById('giftBoxWrapper');
            const giftControls = document.getElementById('giftControls');
            const giftPassword = document.getElementById('giftPassword');
            const giftUnlockBtn = document.getElementById('giftUnlockBtn');
            const giftResult = document.getElementById('giftResult');
            const giftResultAmount = document.getElementById('giftResultAmount');
            const giftResultIcon = document.getElementById('giftResultIcon');
            const giftSmallMsg = document.getElementById('giftSmallMsg');
            const congratsText = document.getElementById('congratsText');
            const musicBtn = document.getElementById('musicBtn');
            const musicLabel = document.getElementById('musicLabel');

            // ===== GIFTS =====
            const GIFTS = [
                { icon: '💖', title: 'សេចក្ដីស្រឡាញ់គ្មានទីបញ្ចប់', desc: 'បងស្រឡាញ់អូនច្រើនជាងផ្កាយទាំងអស់លើមេឃ' },
                { icon: '🌹', title: 'ផ្កាកុលាប ៩៩ ដើម', desc: 'តំណាងសេចក្ដីស្រឡាញ់ដ៏ជ្រាលជ្រៅគ្មានទីបញ្ចប់' },
                { icon: '💎', title: 'ពេជ្រនៃក្តីស្រឡាញ់', desc: 'អូនជាតម្លៃដ៏ថ្លៃថ្លាបំផុតក្នុងជីវិតបង' },
                { icon: '🌌', title: 'ចក្រវាលនៃក្តីសុបិន', desc: 'បងនឹងនាំអូនទៅកាន់ចក្រវាលនៃសុភមង្គល' },
                { icon: '☀️', title: 'ពន្លឺព្រះអាទិត្យនៃជីវិត', desc: 'អូនគឺជាពន្លឺបំភ្លឺផ្លូវជីវិតបង' },
                { icon: '🌙', title: 'ពន្លឺព្រះចន្ទ្រាដ៏ទន់ភ្លន់', desc: 'បងនឹងនៅក្បែរអូនគ្រប់រាត្រីដ៏ស្ងប់' },
                { icon: '🌈', title: 'ឥន្ទធនូនៃក្តីសង្ឃឹម', desc: 'សូមឲ្យអូនមានសុភមង្គលគ្រប់ពណ៌នៃឥន្ទធនូ' },
                { icon: '🦋', title: 'សេរីភាពដូចមេអំបៅ', desc: 'សូមឲ្យអូនហោះហើរទៅរកសុបិនដោយសេរី' },
                { icon: '💫', title: 'ផ្កាយនៃក្តីស្រឡាញ់អស់កល្ប', desc: 'បងនឹងស្រឡាញ់អូនដរាបណាផ្កាយនៅលើមេឃ' },
                { icon: '🤗', title: 'ការឱបដ៏កក់ក្តៅអស់កល្ប', desc: 'សន្យាថានឹងមិនដែលលែងអូនឡើយ' }
            ];

            // ===== COUNTDOWN =====
            function startCountdown() {
                const target = new Date(TARGET_YEAR, TARGET_MONTH, TARGET_DAY);
                const now = new Date();
                const isToday = now.getDate() === TARGET_DAY && now.getMonth() === TARGET_MONTH && now.getFullYear() === TARGET_YEAR;

                if (now > target && !isToday) {
                    birthdayText.innerHTML = `<span style="color:#ff6b6b;">ថ្ងៃកំណើតបានកន្លងផុតហើយ</span>`;
                    countdown.style.display = 'none';
                    if (window.timer) clearInterval(window.timer);
                    return;
                }

                if (isToday) {
                    const age = now.getFullYear() - BIRTH_YEAR;
                    birthdayText.innerHTML = `
                        <span class="highlight">🎊 រីករាយថ្ងៃកំណើតទី ${age} ឆ្នាំ 🎊</span>
                        <br><span style="font-size:1rem;color:rgba(255,255,255,0.7);margin-top:5px;display:block;">
                            <i class="fas fa-heart" style="color:#ff6b6b;"></i>
                            សូមឲ្យអូនមានសុភមង្គល សុខភាពល្អ និងស្នេហ៍ជារៀងរហូត
                            <i class="fas fa-heart" style="color:#ff6b6b;"></i>
                        </span>
                        <br><span style="font-size:0.9rem;color:rgba(255,255,255,0.4);">
                            <i class="fas fa-rocket"></i> ហោះឡើងទៅកាន់តារានិករនៃសុភមង្គល <i class="fas fa-rocket"></i>
                        </span>
                    `;
                    countdown.style.display = 'none';
                    createConfetti(300);
                    giftControls.style.display = 'flex';
                    if (window.timer) clearInterval(window.timer);
                    return;
                }

                birthdayText.innerHTML = `
                    <span style="color:#ffd700;">ថ្ងៃកំណើតរបស់អូន</span>
                    <br><span style="font-size:1.2rem;">${target.toLocaleDateString('km-KH', { day:'numeric', month:'long', year:'numeric' })}</span>
                    <br><span style="font-size:0.9rem;color:rgba(255,255,255,0.3);">
                        <i class="fas fa-hourglass-half"></i> នឹងមកដល់ក្នុងរយៈពេល
                    </span>
                `;
                countdown.style.display = 'flex';
                updateCountdown(target);
                window.timer = setInterval(() => updateCountdown(target), 1000);
                createMiniConfetti();
            }

            function updateCountdown(target) {
                const now = new Date().getTime();
                const remain = target.getTime() - now;
                if (remain <= 0) {
                    daysEl.textContent = '0';
                    hoursEl.textContent = '00';
                    minutesEl.textContent = '00';
                    secondsEl.textContent = '00';
                    if (window.timer) clearInterval(window.timer);
                    startCountdown();
                    return;
                }
                const d = Math.floor(remain / (1000*60*60*24));
                const h = Math.floor((remain % (1000*60*60*24)) / (1000*60*60));
                const m = Math.floor((remain % (1000*60*60)) / (1000*60));
                const s = Math.floor((remain % (1000*60)) / 1000);
                daysEl.textContent = d;
                hoursEl.textContent = String(h).padStart(2, '0');
                minutesEl.textContent = String(m).padStart(2, '0');
                secondsEl.textContent = String(s).padStart(2, '0');
            }

            // ===== CONFETTI =====
            function createConfetti(count = 300) {
                const colors = ['#ff6b6b', '#ffd700', '#a18cd1', '#fbc2eb', '#ff9a9e', '#fad0c4', '#a8edea', '#667eea', '#f093fb', '#4facfe'];
                for (let i = 0; i < count; i++) {
                    const el = document.createElement('div');
                    el.className = 'confetti';
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.top = '-20px';
                    el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    const size = Math.random() * 14 + 4;
                    el.style.width = size + 'px';
                    el.style.height = size + 'px';
                    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    el.style.transform = `rotate(${Math.random() * 360}deg)`;
                    document.body.appendChild(el);
                    animateConfetti(el);
                }
            }

            function createMiniConfetti() {
                const colors = ['#ffd700', '#ff6b6b', '#a18cd1', '#fbc2eb'];
                for (let i = 0; i < 40; i++) {
                    const el = document.createElement('div');
                    el.className = 'confetti';
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.top = '-10px';
                    el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    const size = Math.random() * 8 + 3;
                    el.style.width = size + 'px';
                    el.style.height = size + 'px';
                    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    document.body.appendChild(el);
                    animateConfetti(el, 1.5);
                }
            }

            function animateConfetti(el, mult = 1) {
                const dur = (Math.random() * 2 + 1.5) * mult;
                const horiz = Math.random() * 500 - 250;
                el.style.opacity = '1';
                el.style.transition = `all ${dur}s cubic-bezier(0.1, 0.8, 0.2, 1)`;
                setTimeout(() => {
                    el.style.transform = `translate(${horiz}px, ${window.innerHeight + 50}px) rotate(${Math.random() * 720}deg)`;
                    el.style.opacity = '0';
                }, 10);
                setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, dur * 1000 + 100);
            }

            // ===== GIFT =====
            function revealGift() {
                const gift = GIFTS[Math.floor(Math.random() * GIFTS.length)];
                giftBox.classList.add('gift-open');
                createConfetti(200);
                giftResult.style.display = 'block';
                giftResultIcon.textContent = gift.icon;
                giftResultAmount.textContent = `🎁 ${gift.title}`;
                giftSmallMsg.textContent = gift.desc;
                const audio = document.getElementById('bgAudio');
                if (audio && audio.paused) { try { audio.play(); } catch(e) {} }
                if (musicLabel) {
                    musicLabel.textContent = 'កំពុងចាក់';
                    musicBtn.innerHTML = '<i class="fas fa-volume-up"></i> <span id="musicLabel">កំពុងចាក់</span>';
                }
                setTimeout(() => giftBox.classList.remove('gift-open'), 3500);
            }

            function unlock(showMsg = true) {
                const now = new Date();
                const isToday = now.getDate() === TARGET_DAY && now.getMonth() === TARGET_MONTH;
                if (!isToday) {
                    if (showMsg) {
                        giftResult.style.display = 'block';
                        giftResultIcon.textContent = '🚀';
                        giftResultAmount.textContent = 'មិនទាន់ដល់ថ្ងៃទី 17 ទេ';
                        giftSmallMsg.textContent = 'កំពុងហោះកាត់ Galaxy ដើម្បីមករកអូន 💕';
                        setTimeout(() => giftResult.style.display = 'none', 2800);
                    }
                    return;
                }
                const pw = giftPassword ? giftPassword.value.trim() : '';
                if (pw === PASSWORD) {
                    revealGift();
                    congratsText.style.display = 'block';
                    giftPassword.value = '';
                    setTimeout(() => congratsText.style.display = 'none', 5000);
                } else {
                    giftResult.style.display = 'block';
                    giftResultIcon.textContent = '❌';
                    giftResultAmount.textContent = 'ពាក្យសម្ងាត់មិនត្រឹមត្រូវ';
                    giftSmallMsg.textContent = 'សូមព្យាយាមម្តងទៀត 💪';
                    setTimeout(() => giftResult.style.display = 'none', 2500);
                }
            }

            // ===== EVENTS =====
            giftBoxWrapper.addEventListener('click', () => {
                if (giftControls.style.display === 'none') {
                    giftControls.style.display = 'flex';
                    if (giftPassword) giftPassword.focus();
                    return;
                }
                unlock(true);
            });

            giftUnlockBtn.addEventListener('click', () => unlock(false));
            giftPassword.addEventListener('keypress', (e) => { if (e.key === 'Enter') unlock(false); });

            // ===== MUSIC =====
            const bgAudio = document.createElement('audio');
            bgAudio.id = 'bgAudio';
            bgAudio.src = 'music/Happy.mp3';
            bgAudio.loop = true;
            bgAudio.preload = 'auto';
            bgAudio.volume = 0.4;
            document.body.appendChild(bgAudio);
            let musicPlaying = false;

            musicBtn.addEventListener('click', function() {
                if (!musicPlaying) {
                    bgAudio.play().then(() => {
                        musicPlaying = true;
                        musicBtn.innerHTML = '<i class="fas fa-volume-up"></i> <span id="musicLabel">បិទភ្លេង</span>';
                    }).catch(() => {
                        musicBtn.innerHTML = '<i class="fas fa-music"></i> <span id="musicLabel">ចាក់ភ្លេង</span>';
                    });
                } else {
                    bgAudio.pause();
                    musicPlaying = false;
                    musicBtn.innerHTML = '<i class="fas fa-music"></i> <span id="musicLabel">ចាក់ភ្លេង</span>';
                }
            });

            // ===== INIT =====
            startCountdown();
            const now = new Date();
            if (now.getDate() === TARGET_DAY && now.getMonth() === TARGET_MONTH) {
                giftControls.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
