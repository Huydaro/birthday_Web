<!DOCTYPE html>
<html lang="km">
<head>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }

        /* ផ្ទៃមេឃ និងពពកអវកាស (Nebula) */
        .universe {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #4a00e0, transparent 40%),
                        radial-gradient(circle at 80% 70%, #ff0055, transparent 40%),
                        radial-gradient(circle at 50% 50%, #00d4ff, transparent 30%);
            animation: rotateNebula 60s linear infinite;
        }

        @keyframes rotateNebula { 100% { transform: rotate(360deg); } }

        /* ព្រះអាទិត្យ */
        .sun {
            position: absolute; top: -50px; right: -50px; width: 300px; height: 300px;
            background: radial-gradient(circle, #fff7a0, #ff6600);
            border-radius: 50%; box-shadow: 0 0 150px #ff6600;
        }

        /* យានអវកាស និងសាន់តា */
        .ship-container {
            position: absolute; top: 40%; left: -20%;
            animation: flight 18s linear infinite;
        }
        .ship { font-size: 80px; filter: drop-shadow(0 0 20px #00d4ff); }
        
        @keyframes flight {
            0% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(50vw) translateY(-100px); }
            100% { transform: translateX(120vw) translateY(0); }
        }

        /* ផ្កាព្រិលអវកាស */
        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: blink 2s infinite alternate;
        }
        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="universe"></div>
    <div class="sun"></div>
    <div class="ship-container">
        <div class="ship">🚀🎅🛷🎁</div>
    </div>

    <script>
        // បង្កើតផ្កាយរាប់រយ
        for(let i=0; i<200; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            let size = Math.random() * 3 + 'px';
            s.style.width = s.style.height = size;
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(s);
        }
    </script>
</body>
</html>
